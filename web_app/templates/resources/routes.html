{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="header-section">
        <h1>Cloud Routes</h1>
        <p class="subtitle">Статические маршруты: VPC, Magic Routers</p>
    </div>

    <div class="vpc-grid">
        <div class="vpc-card">
            <div class="vpc-header">
                <span class="vpc-name">{{ vpc_name }}</span>
                <span class="badge">{{ routes|length }} routes</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
